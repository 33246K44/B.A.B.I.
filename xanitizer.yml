name: "Enhanced Android CI/CD Pipeline"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    - cron: '39 16 * * 3'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Gradle Build Cache
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false
      
      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2
      
      - name: Build Android Project
        run: ./gradlew clean build --build-cache --parallel
      
      - name: Run Unit Tests
        run: ./gradlew test --build-cache
      
      - name: Run Android Lint
        run: ./gradlew lint
        continue-on-error: true
      
      - name: Upload Lint Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/lint-results*.xml
      
      - name: Generate Code Coverage Report
        run: ./gradlew jacocoTestReport
        continue-on-error: true
      
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            **/build/reports/jacoco/**

  security-analysis:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: 'temurin'
          cache: gradle
      
      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'B.A.B.I.'
          path: '.'
          format: 'SARIF'
          args: >
            --enableExperimental
        continue-on-error: true
      
      - name: Upload Dependency Check Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dependency-check-report.sarif
          category: 'dependency-check'
        continue-on-error: true
      
      - name: Setup Gradle Build Cache
        uses: gradle/actions/setup-gradle@v3
      
      - name: Xanitizer Security Analysis
        uses: RIGS-IT/xanitizer-action@87d13138fb113b727cbe040c744a15a2b4fe5316
        with:
          license: ${{ secrets.XANITIZER_LICENSE }}
        continue-on-error: true
      
      - name: Upload Xanitizer Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xanitizer-reports
          path: |
            *-Findings-List.pdf
            *-Findings-List.sarif
      
      - name: Upload Xanitizer SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: Xanitizer-Findings-List.sarif
          category: 'xanitizer'
        continue-on-error: true
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'java'
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3